<!DOCTYPE html>
<html data-bs-theme="dark" lang="en">
    <head>
        <meta charset="UTF-8">
        <meta content="width=device-width, initial-scale=1.0" name="viewport">
        <link href="/favicon.svg" rel="icon" type="image/svg+xml">
        <title>Profile</title>
        <link href="/webjars/bootstrap/5.3.8/css/bootstrap.min.css" rel="stylesheet"/>
        <link href="/webjars/bootstrap-icons/1.13.1/font/bootstrap-icons.css" rel="stylesheet"/>
        <link href="/css/main.css" rel="stylesheet"/>
        <script src="/js/view-engine.js"></script>
        <script src="/js/prl-utils.js"></script>
        <script src="/js/navbar.js"></script>
    </head>
    <body>

        <div class="container mt-4" data-prl-detail="prl.userViewService.getUserInfo">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">

                    <div class="alert alert-warning d-none" data-prl-show-if="passwordChangeRequired">
                        <h6 class="alert-heading"><i class="bi bi-exclamation-triangle"></i> Password change required
                        </h6>
                        <p class="mb-0">You are using an initial one-time password. Please set a new password before
                                        continuing.</p>
                    </div>

                    <div class="card mb-3">
                        <div class="card-header"><i class="bi bi-person-circle"></i> Profile</div>
                        <div class="card-body">
                            <p>
                                Login: <strong data-prl-field="login"></strong><br>
                                Roles: <span class="text-muted" data-prl-fn="rolesText"></span>
                            </p>
                        </div>
                    </div>

                    <div class="card mb-3" data-prl-hide-if="passwordChangeRequired">
                        <div class="card-header"><i class="bi bi-card-text"></i> Display name</div>
                        <div class="card-body">
                            <div class="alert d-none" id="dn-alert"></div>
                            <div class="mb-3">
                                <input class="form-control" data-prl-input="displayName" id="display-name-input"
                                       type="text">
                            </div>
                            <button class="btn btn-primary"
                                    data-prl-alert="#dn-alert"
                                    data-prl-args="displayNameArgs"
                                    data-prl-form="prl.userViewService.changeDisplayName"
                                    data-prl-success-msg="Saved."
                                    data-prl-validate="validateDisplayName">Save
                            </button>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header"><i class="bi bi-shield-lock"></i> Change password</div>
                        <div class="card-body">
                            <div class="alert d-none" id="pw-alert"></div>
                            <div class="mb-3" data-prl-hide-if="passwordChangeRequired" id="current-password-row">
                                <label class="form-label required" for="current-password">Current password</label>
                                <input class="form-control" id="current-password" type="password">
                            </div>
                            <div class="mb-3">
                                <label class="form-label required" for="new-password">New password</label>
                                <input class="form-control" id="new-password" type="password">
                            </div>
                            <div class="mb-3">
                                <label class="form-label required" for="confirm-password">Confirm new password</label>
                                <input class="form-control" id="confirm-password" type="password">
                            </div>
                            <button class="btn btn-primary"
                                    data-prl-alert="#pw-alert"
                                    data-prl-args="passwordArgs"
                                    data-prl-form="prl.userViewService.changePassword"
                                    data-prl-success="onPasswordChanged"
                                    data-prl-success-msg="Password changed. Redirecting..."
                                    data-prl-validate="validatePassword">Change password
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            function rolesText(d) {
                return (d.roles || []).join(", ");
            }

            function displayNameArgs() {
                return [Prl.val("#display-name-input").trim()];
            }

            function validateDisplayName() {
                return Prl.val("#display-name-input").trim() ? null : "Display name must not be empty";
            }

            function isOtp() {
                // The Current-password row is hidden via data-prl-hide-if when the
                // user is in OTP (forced-change) mode - mirror that here so the
                // payload and validation don't ask for what we just hid.
                const row = document.getElementById("current-password-row");
                return !!row && row.classList.contains("d-none");
            }

            function passwordArgs() {
                return [{
                    currentPassword: isOtp() ? null : Prl.val("#current-password"),
                    newPassword: Prl.val("#new-password"),
                }];
            }

            function validatePassword() {
                const next = Prl.val("#new-password");
                const confirm = Prl.val("#confirm-password");
                if (!next) return "New password is required";
                if (!isOtp() && !Prl.val("#current-password")) return "Current password is required";
                if (next !== confirm) return "New password and confirmation do not match";
                if (next.length < 8) return "New password must be at least 8 characters long";
                return null;
            }

            function onPasswordChanged() {
                setTimeout(() => {
                    window.location.href = "/";
                }, 800);
            }
        </script>
    </body>
</html>
