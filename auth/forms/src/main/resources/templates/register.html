<!DOCTYPE html>
<html data-bs-theme="dark" lang="en">
    <head>
        <meta charset="UTF-8">
        <meta content="width=device-width, initial-scale=1.0" name="viewport">
        <title>Registration</title>
        <script src="/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>
        <link href="/webjars/bootstrap/5.3.8/css/bootstrap.min.css" rel="stylesheet"/>
        <link href="/webjars/bootstrap-icons/1.13.1/font/bootstrap-icons.css" rel="stylesheet"/>
        <link href="/css/main.css" rel="stylesheet"/>
        <script src="/js/view-engine.js"></script>
    </head>
    <body class="login-body">
        <div class="container">
            <div class="login-container"
                 data-view-redirect="/"
                 data-view-save="signUp"
                 data-view-service="prl.registerViewService">

                <div class="login-header"><h2><i class="bi bi-person-plus"></i> Parallel</h2></div>

                <div class="alert d-none" data-url-alert='{"alreadyExists":"User already exists!"}'
                     data-view-alert></div>

                <div class="form-group">
                    <label class="form-label">Login
                        <input autofocus class="form-control" name="login" placeholder="Login" required type="text">
                    </label>
                </div>
                <div class="form-group">
                    <label class="form-label">Password
                        <input class="form-control" name="password" placeholder="Password" required type="password">
                    </label>
                </div>
                <div class="d-grid gap-2">
                    <button class="btn btn-primary btn-lg" data-view-save-btn>
                        <i class="bi bi-box-arrow-in-right"></i> Sign Up
                    </button>
                </div>
                <div class="mt-1 text-end">
                    <a class="btn btn-link" href="/login">Sign In</a>
                </div>
            </div>
        </div>
    </body>
</html>
