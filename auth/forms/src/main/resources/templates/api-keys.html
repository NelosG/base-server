<!DOCTYPE html>
<html data-bs-theme="dark" lang="en">
    <head>
        <meta charset="UTF-8">
        <meta content="width=device-width, initial-scale=1.0" name="viewport">
        <link href="/favicon.svg" rel="icon" type="image/svg+xml">
        <title>API Keys</title>
        <link href="/webjars/bootstrap/5.3.8/css/bootstrap.min.css" rel="stylesheet"/>
        <link href="/webjars/bootstrap-icons/1.13.1/font/bootstrap-icons.css" rel="stylesheet"/>
        <link href="/css/main.css" rel="stylesheet"/>
        <script src="/js/view-engine.js"></script>
        <script src="/js/prl-utils.js"></script>
        <script src="/js/navbar.js"></script>
    </head>
    <body>

        <div class="container mt-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="mb-0"><i class="bi bi-key"></i> API Keys</h3>
                <button class="btn btn-primary" id="btn-show-create">
                    <i class="bi bi-plus-lg"></i> Create Key
                </button>
            </div>

            <div class="card mb-4 d-none" id="create-card">
                <div class="card-body">
                    <div class="alert d-none" id="create-alert"></div>
                    <div class="row align-items-end">
                        <div class="col-md-8">
                            <label class="form-label" for="key-name">Key Name</label>
                            <input class="form-control" id="key-name" placeholder="e.g. test-runner-prod" type="text">
                        </div>
                        <div class="col-md-4 mt-2 mt-md-0">
                            <button class="btn btn-success w-100"
                                    data-prl-alert="#create-alert"
                                    data-prl-args="createArgs"
                                    data-prl-form="prl.apiKeyViewService.createApiKey"
                                    data-prl-success="onCreated"
                                    data-prl-validate="validateCreate">
                                <i class="bi bi-plus-circle"></i> Create
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="alert alert-warning d-none" id="raw-key-alert">
                <h6 class="alert-heading"><i class="bi bi-exclamation-triangle"></i> Save this key now!</h6>
                <p class="mb-2">This key will only be shown once. Copy it before closing this alert.</p>
                <div class="input-group mb-2">
                    <input class="form-control font-monospace" id="raw-key-value" readonly type="text">
                    <button class="btn btn-outline-secondary" id="btn-copy-key" type="button">
                        <i class="bi bi-clipboard"></i> Copy
                    </button>
                </div>
                <button class="btn btn-sm btn-outline-warning" id="btn-dismiss-key">Dismiss</button>
            </div>

            <div class="card">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0"
                               data-prl-empty="#empty"
                               data-prl-list="prl.apiKeyViewService.getApiKeys"
                               data-prl-row="keyRow">
                            <thead>
                                <tr>
                                    <th>Prefix</th>
                                    <th>Name</th>
                                    <th>Active</th>
                                    <th>Created</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                    <div class="text-center text-muted p-3 d-none" id="empty">No API keys yet.</div>
                </div>
            </div>
        </div>

        <script>
            const SVC = "prl.apiKeyViewService";

            function validateCreate() {
                return Prl.val("#key-name").trim() ? null : "Name is required";
            }

            function createArgs() {
                return [{name: Prl.val("#key-name").trim()}];
            }

            function onCreated(resp) {
                Prl.$("#key-name").value = "";
                Prl.$("#create-card").classList.add("d-none");
                Prl.$("#raw-key-value").value = resp.rawKey;
                Prl.$("#raw-key-alert").classList.remove("d-none");
                Prl.reloadList();
            }

            function keyRow(k) {
                const tr = document.createElement("tr");
                const prefixTd = document.createElement("td");
                prefixTd.appendChild(Prl.el("code", {text: (k.keyPrefix || "") + "..."}));
                tr.appendChild(prefixTd);
                tr.appendChild(Prl.td(k.name || ""));

                const activeTd = document.createElement("td");
                activeTd.appendChild(Prl.el("span", {
                    className: "badge " + (k.active ? "bg-success" : "bg-secondary"),
                    text: k.active ? "Active" : "Inactive",
                }));
                tr.appendChild(activeTd);

                tr.appendChild(Prl.td(Prl.formatDate(k.createdAt)));

                const actTd = document.createElement("td");
                actTd.appendChild(Prl.el("button", {
                    className: "btn btn-sm btn-outline-danger",
                    onClick: () => Prl.confirmCall("Delete this API key?",
                        SVC, "deleteApiKey", [{id: k.id}], () => Prl.reloadList()),
                }));
                actTd.lastChild.appendChild(Prl.el("i", {className: "bi bi-trash"}));
                return tr;
            }

            Prl.$("#btn-show-create").addEventListener("click", () => {
                Prl.$("#create-card").classList.toggle("d-none");
                if (!Prl.$("#create-card").classList.contains("d-none")) Prl.$("#key-name").focus();
            });
            Prl.$("#btn-copy-key").addEventListener("click", () => {
                const input = Prl.$("#raw-key-value");
                input.select();
                navigator.clipboard.writeText(input.value);
            });
            Prl.$("#btn-dismiss-key").addEventListener("click", () => {
                Prl.$("#raw-key-alert").classList.add("d-none");
                Prl.$("#raw-key-value").value = "";
            });
        </script>
    </body>
</html>
