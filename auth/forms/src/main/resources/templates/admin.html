<!DOCTYPE html>
<html data-bs-theme="dark" lang="en">
    <head>
        <meta charset="UTF-8">
        <meta content="width=device-width, initial-scale=1.0" name="viewport">
        <title>Admin</title>
        <link href="/webjars/bootstrap/5.3.8/css/bootstrap.min.css" rel="stylesheet"/>
        <link href="/webjars/bootstrap-icons/1.13.1/font/bootstrap-icons.css" rel="stylesheet"/>
        <link href="/css/main.css" rel="stylesheet"/>
        <script src="/js/view-engine.js"></script>
        <script src="/js/navbar.js"></script>
    </head>
    <body>

        <div class="container mt-4">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-4">
                    <div class="card"
                         data-view-save="createAdmin"
                         data-view-service="prl.adminViewService">
                        <div class="card-header text-center">
                            <h4 class="mb-0"><i class="bi bi-shield-lock"></i> Create Admin</h4>
                        </div>
                        <div class="card-body">
                            <div class="alert d-none" data-view-alert></div>
                            <div class="mb-3">
                                <label class="form-label" for="login">Login</label>
                                <input autofocus class="form-control" id="login"
                                       name="login" placeholder="Enter login" type="text">
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="password">Password</label>
                                <input class="form-control" id="password"
                                       name="password" placeholder="Enter password" type="password">
                            </div>
                            <button class="btn btn-primary w-100" data-view-save-btn>Create admin</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
