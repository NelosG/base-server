<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<meta content="text/html; charset=UTF-8" http-equiv="Content-Type">
<head>
    <title>Login</title>

    <link rel="stylesheet" th:href="@{webjars/bootstrap/5.2.3/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>

<div th:if="${param.error}">
    Invalid username and password.
</div>

<div th:if="${param.logout}">
    You have been logged out.
</div>

<form class="form" method="POST" th:action="@{/login/sign-in}" th:object="${data}">
    <div class="form-group">
        <label> Login
            <input type="text"
                   name="login" class="form-control" th:field="*{login}"
                   placeholder="login" autofocus="autofocus"></label>
        <label>Password
            <input type="password"
                   name="password" class="form-control" th:field="*{password}"
                   placeholder="Enter Password"/></label>
        <input class="form-btn" type="submit" value="Sign In"/>
    </div>
</form>

<form class="form" method="POST" th:action="@{/login/sign-up}" th:object="${data}">
    <div class="form-group">
        <label> Login
            <input type="text"
                   name="login" class="form-control" th:field="*{login}"
                   placeholder="login" autofocus="autofocus"></label>
        <label>Password
            <input type="password"
                   name="password" class="form-control" th:field="*{password}"
                   placeholder="Enter Password"/></label>
        <input class="form-btn" type="submit" value="Sign Up"/>
    </div>
</form>

</body>
</html>
