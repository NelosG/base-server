name: gitlab
services:
  gitlab:
    image: gitlab/gitlab-ce:latest
    restart: unless-stopped
    hostname: gitlab.local
    environment:
      GITLAB_OMNIBUS_CONFIG: "external_url 'http://localhost:8929';
       nginx['listen_port'] = 80;
       gitlab_rails['gitlab_shell_ssh_port'] = 2224;
       puma['worker_processes'] = 2;
       puma['min_threads'] = 1;
       puma['max_threads'] = 8;
       sidekiq['concurrency'] = 20;
       postgresql['shared_buffers'] = '1GB';
       postgresql['effective_cache_size'] = '1GB';
       postgresql['work_mem'] = '1GB';
       prometheus_monitoring['enable'] = false;
       gitaly['configuration'] = { concurrency: [{ rpc:'/gitaly.SmartHTTPService/PostReceivePack', max_per_repo: 5 }] }"
    ports:
      - 8929:80
      - 2224:22
    volumes:
      - /mnt/ssd-pool/storage/docker/gitlab/config:/etc/gitlab
      - /mnt/ssd-pool/storage/docker/gitlab/logs:/var/log/gitlab
      - /mnt/ssd-pool/storage/docker/gitlab/data:/var/opt/gitlab
    shm_size: 1g
    networks:
      - gitlab_net
  gitlab-runner:
    image: gitlab/gitlab-runner:latest
    restart: unless-stopped
    volumes:
      - /mnt/ssd-pool/storage/docker/gitlab-runner/config:/etc/gitlab-runner
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - gitlab_net

networks:
  gitlab_net:
    name: gitlab_gitlab_net
    driver: bridge
    enable_ipv6: false