spring.main.banner-mode=off
spring.main.log-startup-info=false
spring.output.ansi.enabled=ALWAYS
# Embedded Tomcat tuning for high-rate inbound traffic (engine progress callbacks ~40 evt/s
# on long-lived keep-alive connections from cpp-httplib clients).
# Defaults (20s / 100 reqs) caused "Failed to read connection" drops when engine workers
# paused between events for >20s during build phases.
server.tomcat.connection-timeout=120000
server.tomcat.keep-alive-timeout=120000
server.tomcat.max-keep-alive-requests=10000
server.tomcat.threads.max=400
server.tomcat.threads.min-spare=20
server.tomcat.accept-count=200
# Access log for /api/callback/** diagnostics (separate file under logs/).
# %h remote-host  %t timestamp  "%r" request-line  %s status  %b body-bytes  %D elapsed-microseconds  %{X-API-Key-Prefix}i?
server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.directory=logs
server.tomcat.accesslog.prefix=access
server.tomcat.accesslog.suffix=.log
server.tomcat.accesslog.pattern=%h %t "%r" %s %b %D
# Surface tomcat / hikari / http metrics for capacity diagnostics.
management.endpoints.web.exposure.include=health,info,metrics,prometheus
# Close EntityManager at the end of each @Transactional boundary instead of holding it for the whole HTTP request.
# Avoids cross-transaction auto-flush surprises during NodeRegistration (race between offline/online events).
spring.jpa.open-in-view=false
# Group INSERTs/UPDATEs into JDBC batches - main winner is the final result handler
# which appends 30-50 log lines per submission inside a single transaction. All entities
# use SEQUENCE generators (no IDENTITY), so batching is fully effective.
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
security.jwt.token.secret-key=${JWT_SECRET:default-dev-secret-change-in-production}
# DataSource / HikariCP pool config lives in dev-app/src/main/resources/config/context.xml
# (explicit `dataSource` bean - Spring Boot's HikariAutoConfiguration backs off).
# RabbitMQ - picked up by Spring Boot's RabbitAutoConfiguration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/
spring.rabbitmq.template.reply-timeout=30000
# Submission stuck-timeout in milliseconds: a single value used by both
# StuckSubmissionCleanupJob (marks DISPATCHED/PENDING older than this as TIMEOUT)
# and the AMQP submitTask per-message TTL (broker drops queued tasks older than
# this). Keep it aligned with GitLab CI's job timeout (`timeout: 10m` in
# delivery/gitlab-ci/.gitlab-ci.yml) so we don't process work the CI side has
# already abandoned. 600000 ms = 10 minutes.
parallel.submission.stuck-timeout=600000
# GitLab Integration
gitlab.url=http://localhost:8929
gitlab.api.token=${GITLAB_API_TOKEN:REPLACE_ME_GITLAB_PAT}
gitlab.server.base-url=${PARALLEL_SERVER_BASE_URL:http://localhost:8085}
# Runner configuration is fully UI-driven via /runners (DB-backed prl_runner_config table).
