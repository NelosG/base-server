# Load-test profile - only used by PipelineLoadTest.

spring.datasource.url=jdbc:postgresql://placeholder:5432/placeholder
spring.datasource.username=placeholder
spring.datasource.password=placeholder

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

logging.level.root=WARN
logging.level.com.nelos.parallel.load=INFO
logging.level.org.testcontainers=WARN
logging.level.org.springframework=WARN

spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10

server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20

management.endpoints.web.exposure.include=health,metrics,prometheus
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# Stub engine - assumes unlimited engine compute. taskDurationMs is the
# realistic per-test latency the engine takes to respond. callback-pool-size
# caps how many handleResult invocations can run in parallel (not engine work).
loadtest.engine.task-duration-ms=5000
loadtest.engine.callback-pool-size=1000

# Combined capacity: full submit -> engine -> callback -> persist cycle.
# Engine always returns; orchestrator capacity is what we measure.

# Phase A - quick discovery scan to surface the rough knee.
loadtest.combined.discovery.rps-levels=10,30,60,90,120,150
loadtest.combined.discovery.step-sec=10

# Phase B - steady-state levels run open-loop, latency captured from scheduled
# time (avoiding coordinated omission). Pick 4 representative levels around
# the discovered knee; tune after first run.
# Phase B - adaptive steady-state. Starts at start-rps and multiplies by
# step-multiplier on each PASS. Stops on first FAIL (don't waste time at
# levels we know will breach). After the first failure, one refinement run
# at the midpoint of last-pass and first-fail tightens the ceiling. Hard
# cap at max-rps in case SLO never breaches.
loadtest.combined.steady.start-rps=25
loadtest.combined.steady.max-rps=500
loadtest.combined.steady.step-multiplier=1.5
loadtest.combined.steady.refine-rounds=1
loadtest.combined.steady.duration-sec=180
loadtest.combined.steady.cooldown-sec=10

# Worker pool sizes for the open-loop generator. Submit pool is large so
# worker availability is NOT a soft cap.
loadtest.client.submit-pool-size=500

# SLOs - declared up front, scenario-aware. CI-driven endpoint tolerates
# seconds of latency (GitLab CI timeout is 10 min); engine baseline is 5s
# so e2e adds 25s of queue tolerance on top.
loadtest.slo.submit-p95-ms=10000
loadtest.slo.submit-p99-ms=30000
loadtest.slo.e2e-p95-ms=30000
loadtest.slo.error-rate-pct=1.0

loadtest.drain-timeout-sec=120

loadtest.fixture.students=50
loadtest.fixture.api-key=loadtest-key-12345

gitlab.url=http://stub-gitlab.invalid
gitlab.api.token=
gitlab.server.base-url=http://stub-callback.invalid
