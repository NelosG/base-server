<!DOCTYPE html>
<html data-bs-theme="dark" lang="en">
    <head>
        <meta charset="UTF-8">
        <meta content="width=device-width, initial-scale=1.0" name="viewport">
        <link href="/favicon.svg" rel="icon" type="image/svg+xml">
        <title>HTTP Adapter Config</title>
        <link href="/webjars/bootstrap/5.3.8/css/bootstrap.min.css" rel="stylesheet"/>
        <link href="/webjars/bootstrap-icons/1.13.1/font/bootstrap-icons.css" rel="stylesheet"/>
        <link href="/css/main.css" rel="stylesheet"/>
        <script src="/js/view-engine.js"></script>
        <script src="/js/prl-utils.js"></script>
        <script src="/js/navbar.js"></script>
        <script src="/js/adapter-config.js"></script>
    </head>
    <body>
        <div class="container mt-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3 class="mb-0"><i class="bi bi-globe"></i> HTTP Adapter Config</h3>
                <button class="btn btn-outline-primary" id="btn-refresh" type="button">
                    <i class="bi bi-arrow-clockwise"></i> Refresh & prune
                </button>
            </div>

            <div class="alert d-none" id="main-alert"></div>

            <input class="form-control form-control-sm mb-3" id="search"
                   data-prl-list-filter=".node-item"
                   placeholder="Filter nodes..." type="text">

            <div class="text-center mt-3" id="loading">
                <div class="spinner-border" role="status"><span class="visually-hidden">Loading...</span></div>
            </div>
            <div id="nodes-list" style="display:none;"></div>
            <div class="text-center text-muted p-3 d-none" id="empty">
                No HTTP nodes registered. Start a runner with HTTP transport to populate this list.
            </div>
        </div>

        <script>
            AdapterConfig.init({svc: "prl.httpAdapterConfigViewService"});
        </script>
    </body>
</html>
