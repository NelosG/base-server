<!DOCTYPE html>
<html data-bs-theme="dark" lang="en">
    <head>
        <meta charset="UTF-8">
        <meta content="width=device-width, initial-scale=1.0" name="viewport">
        <title>Parallel</title>
        <link href="/webjars/bootstrap/5.3.8/css/bootstrap.min.css" rel="stylesheet">
        <link href="/webjars/bootstrap-icons/1.13.1/font/bootstrap-icons.css" rel="stylesheet"/>
        <link href="/css/main.css" rel="stylesheet"/>
        <script src="/js/view-engine.js"></script>
        <script src="/js/navbar.js"></script>
    </head>
    <body>
        <div class="container mt-5"
             data-view-load="getUserInfo"
             data-view-service="prl.userViewService">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="card prl-dashboard-card text-center">
                        <div class="card-body py-5">
                            <i class="bi bi-cpu prl-dashboard-icon"></i>
                            <h2 class="mt-3" style="font-family: var(--prl-mono); font-weight: 700; letter-spacing: 0.03em;">
                                Parallel
                            </h2>
                            <p class="text-muted">Distributed test execution orchestrator</p>
                            <hr>
                            <p class="mb-0">Welcome, <strong><span data-view-field="login"></span></strong>!</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
