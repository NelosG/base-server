<!DOCTYPE html>
<html data-bs-theme="dark" lang="en"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" xmlns:th="http://www.thymeleaf.org">
    <meta content="text/html; charset=UTF-8" http-equiv="Content-Type">
    <head>
        <title>Controls</title>
        <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}">
        <link rel="stylesheet" th:href="@{/css/main.css}"/>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container-fluid">
                <div class="navbar-nav ms-auto">
                    <form class="d-inline" method="post" th:action="@{/logout}">
                        <button class="btn btn-outline-light" type="submit">Logout</button>
                    </form>
                </div>
            </div>
        </nav>

        <div class="card form-control" sec:authorize="hasRole('ADMIN')">
            <div class="card-body">
                <a class="btn btn-primary" th:href="@{/admin}">Admin panel</a>
            </div>
        </div>

    </body>
</html>
