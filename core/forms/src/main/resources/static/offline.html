<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta content="width=device-width, initial-scale=1.0" name="viewport">
        <title>Server Unavailable</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #1a1d21;
                color: #e0e0e0;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            }

            .container {
                text-align: center;
                padding: 2rem;
                max-width: 480px;
            }

            .icon {
                font-size: 5rem;
                margin-bottom: 1.5rem;
                opacity: 0.7;
            }

            h1 {
                font-size: 1.75rem;
                font-weight: 600;
                margin-bottom: 0.75rem;
            }

            p {
                color: #9e9e9e;
                line-height: 1.6;
                margin-bottom: 2rem;
            }

            .btn {
                display: inline-block;
                padding: 0.6rem 1.75rem;
                background: #0d6efd;
                color: #fff;
                border: none;
                border-radius: 6px;
                font-size: 1rem;
                cursor: pointer;
                text-decoration: none;
                transition: background 0.2s;
            }

            .btn:hover {
                background: #0b5ed7;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="icon">&#9888;</div>
            <h1>Server Unavailable</h1>
            <p>The server is currently not responding. Please check your connection or try again later.</p>
            <button class="btn" onclick="window.location.reload()">Retry</button>
        </div>
    </body>
</html>
