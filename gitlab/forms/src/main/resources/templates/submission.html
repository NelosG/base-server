<!DOCTYPE html>
<html data-bs-theme="dark" lang="en">
    <head>
        <meta charset="UTF-8">
        <meta content="width=device-width, initial-scale=1.0" name="viewport">
        <link href="/favicon.svg" rel="icon" type="image/svg+xml">
        <title>Submission</title>
        <link href="/webjars/bootstrap/5.3.8/css/bootstrap.min.css" rel="stylesheet"/>
        <link href="/webjars/bootstrap-icons/1.13.1/font/bootstrap-icons.css" rel="stylesheet"/>
        <link href="/css/main.css" rel="stylesheet"/>
        <script src="/js/view-engine.js"></script>
        <script src="/js/prl-utils.js"></script>
        <script src="/js/navbar.js"></script>
    </head>
    <body>

        <div class="container-fluid mt-4">
            <div class="alert alert-danger d-none" id="not-found">Submission not found or access denied.</div>

            <div class="d-none" data-prl-arg="id"
                 data-prl-detail="prl.submissionViewService.getSubmission"
                 data-prl-fallback="prl.mySubmissionsViewService.getMySubmission"
                 data-prl-not-found="#not-found"
                 id="content">

                <h3 class="mb-3">
                    <i class="bi bi-cloud-upload"></i> Submission #<span data-prl-field="id"></span>
                    <span class="ms-2" data-prl-field="status"></span>
                </h3>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header"><i class="bi bi-info-circle"></i> Details</div>
                            <div class="card-body">
                                <table class="table table-sm mb-0">
                                    <tbody>
                                        <tr>
                                            <td>Student</td>
                                            <td data-prl-fn="studentDisplay"></td>
                                        </tr>
                                        <tr>
                                            <td>GitLab</td>
                                            <td data-prl-field="gitlabName"></td>
                                        </tr>
                                        <tr>
                                            <td>Assignment</td>
                                            <td data-prl-fn="assignmentDisplay"></td>
                                        </tr>
                                        <tr>
                                            <td>MR</td>
                                            <td data-prl-fn-html="Prl.mrLink"></td>
                                        </tr>
                                        <tr>
                                            <td>Branch</td>
                                            <td data-prl-field="sourceBranch"></td>
                                        </tr>
                                        <tr>
                                            <td>Commit</td>
                                            <td data-prl-field="commitSha"></td>
                                        </tr>
                                        <tr>
                                            <td>Created</td>
                                            <td data-prl-field="createdAt"></td>
                                        </tr>
                                        <tr>
                                            <td>Completed</td>
                                            <td data-prl-field="completedAt"></td>
                                        </tr>
                                        <tr>
                                            <td>Solution repo</td>
                                            <td data-prl-field="solutionRepoUrl"></td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header"><i class="bi bi-flag"></i> Result summary</div>
                            <div class="card-body">
                                <p class="mb-0 text-muted" data-prl-field="resultSummary"></p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card mb-3">
                    <div class="card-header"><i class="bi bi-terminal"></i> Log</div>
                    <div class="card-body">
                        <pre class="prl-log" data-prl-field="logText" data-prl-format="raw"></pre>
                    </div>
                </div>

                <div class="card mb-3 d-none" data-prl-show-if="resultJson">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="bi bi-braces"></i> Raw result JSON</span>
                        <button class="btn btn-sm btn-outline-secondary" id="btn-toggle-json">Show</button>
                    </div>
                    <div class="card-body d-none" id="json-body">
                        <pre data-prl-field="resultJson" data-prl-format="json"></pre>
                    </div>
                </div>
            </div>
        </div>

        <script>
            function studentDisplay(d) {
                return (d.displayName || d.login || "") + (d.userId ? " (id=" + d.userId + ")" : "");
            }

            function assignmentDisplay(d) {
                return (d.assignmentCode || "") + (d.assignmentName ? " - " + d.assignmentName : "");
            }

            Prl.$("#btn-toggle-json").addEventListener("click", () => {
                const hidden = Prl.$("#json-body").classList.toggle("d-none");
                Prl.$("#btn-toggle-json").textContent = hidden ? "Show" : "Hide";
            });
        </script>
    </body>
</html>
